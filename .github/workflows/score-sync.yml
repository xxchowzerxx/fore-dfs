name: Live Score Sync

on:
  schedule:
    - cron: '*/10 17-23 * * 4,5,6,0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync scores
        run: |
          curl -X POST ${{ secrets.APP_URL }}/api/sync \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
